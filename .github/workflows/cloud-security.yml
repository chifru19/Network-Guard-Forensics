name: Cloud Security Suite CI
on: [push]

permissions:
  contents: read

jobs:
  secure-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Checkov Scan
        uses: bridgecrewio/checkov-action@master
        with:
          # This tells Checkov to look ONLY in your new folder
          directory: projects/01-S3-Hardening
          framework: terraform
          quiet: true

      - name: Docker Security Scan
        uses: bridgecrewio/checkov-action@master
        with:
          # This tells Checkov to look in your Docker project folder
          directory: projects/03-DevSecOps-CI-CD
          framework: dockerfile